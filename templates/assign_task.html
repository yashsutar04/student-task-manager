% extends 'layout.html' %}

{% block content %}

<h2>Assign Task</h2>

<form method="POST">

    <div class="row mt-4">

        <div class="col-md-6">

            <label class="form-label">
                Student
            </label>

            <select
                name="student_id"
                class="form-control"
                required
            >

                <option value="">
                    Select Student
                </option>

                {% for student in students %}

                <option value="{{ student.student_id }}">

                    {{ student.first_name }}
                    {{ student.last_name }}

                </option>

                {% endfor %}

            </select>

        </div>


        <div class="col-md-6">

            <label class="form-label">
                Task
            </label>

            <select
                name="task_id"
                class="form-control"
                required
            >

                <option value="">
                    Select Task
                </option>

                {% for task in tasks %}

                <option value="{{ task.task_id }}">

                    {{ task.task_name }}

                </option>

                {% endfor %}

            </select>

        </div>

    </div>


    <div class="row mt-3">

        <div class="col-md-4">

            <label class="form-label">
                Submission Status
            </label>

            <select
                name="submission_status"
                class="form-control"
                required
            >

                <option value="Pending">
                    Pending
                </option>

                <option value="Submitted">
                    Submitted
                </option>

                <option value="Late">
                    Late
                </option>

            </select>

        </div>


        <div class="col-md-4">

            <label class="form-label">
                Marks Obtained
            </label>

            <input
                type="number"
                name="obtained_marks"
                class="form-control"
                required
            >

        </div>

    </div>


    <div class="row mt-3">

        <div class="col-md-12">

            <label class="form-label">
                Remarks
            </label>

            <textarea
                name="remarks"
                class="form-control"
                rows="3"
            ></textarea>

        </div>

    </div>


    <button
        type="submit"
        class="btn btn-primary mt-4"
    >
        Assign Task
    </button>

</form>

{% endblock %}
